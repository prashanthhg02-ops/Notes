<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✅ Todo Master | Learn to build a Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Main card container */
    .todo-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .todo-card:hover {
      transform: scale(1.01);
    }

    /* Header section */
    .app-header {
      background: #1e2b3c;
      color: white;
      padding: 1.8rem 2rem;
      text-align: center;
    }

    .app-header h1 {
      font-size: 2rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .app-header h1 span {
      background: #ffb347;
      font-size: 1.8rem;
      display: inline-block;
      padding: 0 0.4rem;
      border-radius: 60px;
    }

    .sub {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 8px;
      font-weight: 400;
    }

    /* Input area */
    .input-section {
      padding: 1.8rem 2rem 1rem 2rem;
      background: white;
    }

    .todo-form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    #taskInput {
      flex: 3;
      min-width: 180px;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 60px;
      outline: none;
      transition: all 0.2s;
      background: #fefefe;
    }

    #taskInput:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    #addBtn {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    #addBtn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #f8fafc;
      margin: 0.8rem 2rem 0 2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #334155;
      border: 1px solid #e2e8f0;
    }

    #taskCount {
      background: #3b82f6;
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-left: 6px;
    }

    /* Filter buttons */
    .filter-group {
      padding: 0rem 2rem 0.5rem 2rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: none;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      color: #475569;
    }

    .filter-btn.active {
      background: #1e293b;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .filter-btn:hover:not(.active) {
      background: #e2e8f0;
    }

    /* Todo list container */
    .todo-list-container {
      padding: 0.5rem 2rem 2rem 2rem;
    }

    #todoList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Individual todo item */
    .todo-item {
      background: white;
      border: 1px solid #eef2ff;
      border-radius: 1.5rem;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    .todo-item:hover {
      border-color: #cbd5e1;
      background: #fefefe;
      transform: translateX(4px);
    }

    .todo-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      word-break: break-word;
    }

    .todo-check {
      width: 22px;
      height: 22px;
      accent-color: #3b82f6;
      cursor: pointer;
      transform: scale(1.05);
    }

    .todo-text {
      font-size: 1rem;
      font-weight: 500;
      color: #0f172a;
      transition: 0.1s;
    }

    /* completed style */
    .completed .todo-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .todo-actions {
      display: flex;
      gap: 8px;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 40px;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
    }

    .edit-btn {
      color: #f59e0b;
    }

    .edit-btn:hover {
      background: #fffbeb;
      transform: scale(1.05);
    }

    .delete-btn {
      color: #ef4444;
    }

    .delete-btn:hover {
      background: #fef2f2;
      transform: scale(1.05);
    }

    /* empty message */
    .empty-message {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #94a3b8;
      font-weight: 500;
      background: #fafcff;
      border-radius: 2rem;
    }

    /* responsive */
    @media (max-width: 500px) {
      .todo-card {
        border-radius: 1.8rem;
      }
      .input-section, .filter-group, .todo-list-container {
        padding-left: 1.2rem;
        padding-right: 1.2rem;
      }
      .todo-item {
        flex-wrap: wrap;
      }
      .todo-actions {
        margin-left: auto;
      }
    }

    /* custom scroll */
    #todoList::-webkit-scrollbar {
      width: 6px;
    }
    #todoList::-webkit-scrollbar-track {
      background: #eef2ff;
      border-radius: 10px;
    }
    #todoList::-webkit-scrollbar-thumb {
      background: #b9c7da;
      border-radius: 10px;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 1rem;
      background: #f1f5f9;
      color: #4b5563;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>

<div class="todo-card">
  <div class="app-header">
    <h1>
      📋 Todo <span>✓</span> Master
    </h1>
    <div class="sub">Stay organized · Learn step by step</div>
  </div>

  <div class="input-section">
    <div class="todo-form">
      <input type="text" id="taskInput" placeholder="Write a new task... e.g., 'Learn JavaScript'" autocomplete="off">
      <button id="addBtn">➕ Add Task</button>
    </div>
  </div>

  <div class="stats-bar">
    <span>📌 Your progress</span>
    <span>Tasks: <span id="taskCount">0</span></span>
  </div>

  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div class="todo-list-container">
    <ul id="todoList">
      <!-- dynamic tasks will appear here -->
      <li class="empty-message">✨ Add your first task! Type something and press "Add Task" ✨</li>
    </ul>
  </div>
  <footer>
    💡 Tip: Click checkbox to complete · Edit ✏️ or Delete 🗑️ · Tasks save automatically in your browser!
  </footer>
</div>

<script>
  // --------------------------------------------------------------
  //  TODO APPLICATION LOGIC (Vanilla JS)
  //  --------------------------------------------------------------
  //  Features:
  //  - Add, Edit, Delete, Complete/Uncomplete tasks
  //  - Filter: All / Pending / Completed
  //  - Persistent storage using localStorage (tasks survive page reload)
  //  - Real-time task counter
  //  - Friendly UI with zero external libraries
  //  --------------------------------------------------------------

  // ----- 1. Grab DOM elements -----
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const todoListContainer = document.getElementById('todoList');
  const taskCountSpan = document.getElementById('taskCount');

  // ----- 2. Data model (array of task objects) -----
  let tasks = [];       // each task: { id, text, completed }
  let currentFilter = 'all';   // 'all', 'pending', 'completed'

  // ----- 3. Helper: save to localStorage -----
  function saveTasksToLocalStorage() {
    localStorage.setItem('todoAppTasks', JSON.stringify(tasks));
  }

  // ----- 4. Helper: load from localStorage (on startup) -----
  function loadTasksFromLocalStorage() {
    const stored = localStorage.getItem('todoAppTasks');
    if (stored) {
      try {
        tasks = JSON.parse(stored);
        // Ensure every task has a valid id (backward compatibility)
        if (!Array.isArray(tasks)) tasks = [];
      } catch(e) { tasks = []; }
    } else {
      // Optional: seed with demo example
      tasks = [
        { id: Date.now() + 1, text: '⭐ Click checkbox to complete task', completed: false },
        { id: Date.now() + 2, text: '✏️ Use edit button to change text', completed: false },
        { id: Date.now() + 3, text: '🗑️ Delete tasks you finish', completed: true }
      ];
      saveTasksToLocalStorage();
    }
  }

  // ----- 5. Core: render the todo list based on current filter -----
  function renderTodoList() {
    // Filter tasks based on currentFilter
    let filteredTasks = [];
    if (currentFilter === 'all') {
      filteredTasks = tasks;
    } else if (currentFilter === 'pending') {
      filteredTasks = tasks.filter(task => !task.completed);
    } else if (currentFilter === 'completed') {
      filteredTasks = tasks.filter(task => task.completed);
    }

    // Update task counter (total tasks number, not filtered)
    const totalTasks = tasks.length;
    taskCountSpan.innerText = totalTasks;

    // If no tasks AND no filtered tasks -> show empty message
    if (filteredTasks.length === 0) {
      let emptyText = '📭 No tasks yet. Add a new one!';
      if (tasks.length > 0 && currentFilter !== 'all') {
        emptyText = currentFilter === 'pending' ? '🎉 No pending tasks! Great job!' : '✅ No completed tasks. Complete some tasks!';
      } else if (tasks.length === 0) {
        emptyText = '✨ Your todo list is empty. Add a task above ✨';
      }
      todoListContainer.innerHTML = `<li class="empty-message">${emptyText}</li>`;
      return;
    }

    // Build HTML for each task
    let listHtml = '';
    for (let task of filteredTasks) {
      const checkedAttr = task.completed ? 'checked' : '';
      // additional class for completed styling
      const completedClass = task.completed ? 'completed' : '';
      
      listHtml += `
        <li class="todo-item ${completedClass}" data-task-id="${task.id}">
          <div class="todo-left">
            <input type="checkbox" class="todo-check" ${checkedAttr} data-id="${task.id}">
            <span class="todo-text">${escapeHtml(task.text)}</span>
          </div>
          <div class="todo-actions">
            <button class="edit-btn" data-id="${task.id}" title="Edit task">✏️</button>
            <button class="delete-btn" data-id="${task.id}" title="Delete task">🗑️</button>
          </div>
        </li>
      `;
    }
    todoListContainer.innerHTML = listHtml;

    // ----- Attach event listeners to dynamically created elements -----
    // Checkbox toggle
    document.querySelectorAll('.todo-check').forEach(checkbox => {
      checkbox.addEventListener('change', (e) => {
        const taskId = parseInt(checkbox.getAttribute('data-id'));
        toggleTaskCompletion(taskId);
      });
    });

    // Edit buttons
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const taskId = parseInt(btn.getAttribute('data-id'));
        editTaskById(taskId);
      });
    });

    // Delete buttons
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const taskId = parseInt(btn.getAttribute('data-id'));
        deleteTaskById(taskId);
      });
    });
  }

  // Helper to escape HTML to prevent XSS
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // ----- 6. CRUD operations -----
  function addNewTask() {
    let taskText = taskInput.value.trim();
    if (taskText === '') {
      alert('Please enter a task description!');
      return;
    }
    // Create new task object
    const newTask = {
      id: Date.now(),   // unique id based on timestamp
      text: taskText,
      completed: false
    };
    tasks.push(newTask);
    saveTasksToLocalStorage();
    // Clear input field
    taskInput.value = '';
    // Refocus on input for smooth UX
    taskInput.focus();
    // Re-render with current filter
    renderTodoList();
  }

  function toggleTaskCompletion(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      saveTasksToLocalStorage();
      renderTodoList();   // re-render to reflect changes
    }
  }

  function editTaskById(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    // Prompt user for new text
    const updatedText = prompt('Edit your task:', task.text);
    if (updatedText !== null && updatedText.trim() !== '') {
      task.text = updatedText.trim();
      saveTasksToLocalStorage();
      renderTodoList();
    } else if (updatedText !== null && updatedText.trim() === '') {
      alert('Task cannot be empty! Edit cancelled.');
    }
  }

  function deleteTaskById(id) {
    // Confirm deletion for better UX
    const confirmDelete = confirm('Are you sure you want to delete this task?');
    if (confirmDelete) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasksToLocalStorage();
      renderTodoList();
    }
  }

  // ----- 7. Filter handling -----
  function setFilter(filterType) {
    currentFilter = filterType;
    // Update active class on filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const btnFilter = btn.getAttribute('data-filter');
      if (btnFilter === filterType) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderTodoList();
  }

  // ----- 8. Event listeners for filter buttons and add button & Enter key -----
  function bindGlobalEvents() {
    addBtn.addEventListener('click', addNewTask);
    
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addNewTask();
      }
    });
    
    // Filter buttons listeners
    const allFilterBtns = document.querySelectorAll('.filter-btn');
    allFilterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filterValue = btn.getAttribute('data-filter');
        setFilter(filterValue);
      });
    });
  }

  // ----- 9. Initialize the whole app -----
  function initApp() {
    loadTasksFromLocalStorage();
    bindGlobalEvents();
    setFilter('all');   // initial render & active filter set
  }

  // start everything when DOM fully loaded
  document.addEventListener('DOMContentLoaded', initApp);
</script>

        - `addNewTask()`: takes input, creates new task, pushes to array, saves & rerenders.
        - `toggleTaskCompletion()`: toggles checkbox, updates status.

</body>
</html>
